<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Background -->
  <rect width="60" height="60" rx="12" fill="#131B2E"/>
  <!-- "ze" in lime green, "na" in teal — matching Zena brand -->
  <text
    x="50%" y="52%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="'Trebuchet MS','Arial Rounded MT Bold',Arial,sans-serif"
    font-size="21"
    font-weight="900"
    letter-spacing="-0.5"
  >
    <tspan fill="#B4E130">ze</tspan><tspan fill="#3DAB80">na</tspan>
  </text>
</svg>
